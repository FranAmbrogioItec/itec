<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        label {
            color: #d1d5db;
            font-weight: 500;
            font-size: 0.9rem;
        }

        input {
            background-color: #374151 !important;
            color: white !important;
            border-color: #4b5563 !important;
            width: 100%;
            padding: 0.5rem;
            border-radius: 0.375rem;
            margin-top: 0.25rem;
        }

        input:focus {
            border-color: #6366f1 !important;
            outline: none;
        }

        .helptext {
            font-size: 0.75rem;
            color: #9ca3af;
            display: block;
            margin-top: 0.25rem;
        }

        ul.errorlist {
            color: #ef4444;
            font-size: 0.875rem;
            list-style: none;
            padding: 0;
        }
    </style>
</head>

<body class="bg-gray-900 flex items-center justify-center min-h-screen py-10">
    <div class="max-w-md w-full bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700">
        <h2 class="text-3xl font-extrabold text-white mb-6 text-center">Crear Cuenta</h2>

        <form method="post" class="space-y-4 text-gray-300">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit"
                class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition duration-300 mt-6">
                Registrarse
            </button>
        </form>

        <p class="text-gray-400 mt-6 text-center text-sm">
            ¿Ya tienes cuenta? <a href="{% url 'login' %}" class="text-indigo-400 hover:text-indigo-300">Inicia
                sesión</a>
        </p>
    </div>
</body>

</html>
