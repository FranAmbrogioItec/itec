<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Eliminar Propiedad</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-6 rounded-lg shadow-xl max-w-md text-center border border-gray-700">
        <h2 class="text-xl font-bold text-red-500 mb-4">¿Estás seguro?</h2>
        <p class="text-gray-300 mb-6">¿Realmente deseas eliminar la propiedad "<strong class="text-white">
                {{ object.titulo }}</strong>"?
            Esta acción no se puede deshacer.</p>

        <form method="post" class="flex justify-center space-x-4">
            {% csrf_token %}
            <a href="{% url 'lista_propiedades' %}"
                class="bg-gray-700 text-white px-4 py-2 rounded hover:bg-gray-600 transition shadow">Cancelar</a>
            <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-500 transition shadow">Sí,
                eliminar</button>
        </form>
    </div>
</body>

</html>
