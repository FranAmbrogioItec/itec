<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Formulario de Propiedad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos extra para que los campos generados por Django se vean bien en Dark Mode */
        label {
            color: #d1d5db;
            font-weight: 500;
        }

        input,
        select,
        textarea {
            background-color: #374151 !important;
            /* bg-gray-700 */
            color: white !important;
            border-color: #4b5563 !important;
            /* border-gray-600 */
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #6366f1 !important;
            /* border-indigo-500 */
            outline: none;
        }
    </style>
</head>

<body class="bg-gray-900 p-8">
    <div class="max-w-xl mx-auto bg-gray-800 p-6 rounded-lg shadow-xl border border-gray-700">
        <h2 class="text-2xl font-bold mb-6 text-white">
            {% if object %}Editar Propiedad{% else %}Nueva Propiedad{% endif %}
        </h2>

        <form method="post" enctype="multipart/form-data" class="space-y-4 text-gray-300">
            {% csrf_token %}
            {{ form.as_p }}

            <div class="flex justify-end space-x-3 mt-6 pt-4 border-t border-gray-700">
                <a href="{% url 'lista_propiedades' %}"
                    class="bg-gray-700 text-white px-4 py-2 rounded hover:bg-gray-600 transition shadow">Cancelar</a>
                <button type="submit"
                    class="bg-indigo-500 text-white px-4 py-2 rounded hover:bg-indigo-400 transition shadow">Guardar</button>
            </div>
        </form>
    </div>
</body>

</html>
