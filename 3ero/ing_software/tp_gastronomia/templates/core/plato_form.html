<!-- templates/core/plato_form.html -->
{% extends 'base.html' %}

{% block title %}{% if object %}Editar{% else %}Nuevo{% endif %} Plato | RestoManager{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md p-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">
        {% if object %}Editar Plato: {{ object.nombre }}{% else %}Registrar Nuevo Plato{% endif %}
    </h1>

    <form method="post" enctype="multipart/form-data" class="space-y-4">
        {% csrf_token %}

        <!-- Renderizamos el formulario básico de Django -->
        {{ form.as_p }}

        <div class="flex space-x-4 mt-6">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                Guardar
            </button>
            <a href="{% url 'core:plato_list' %}"
                class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
