{% extends 'base.html' %}

{% block title %}Hacer Reserva | RestoManager{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto bg-white rounded-lg shadow-md p-8 mt-10">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Reservar una Mesa</h1>

    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div class="bg-blue-50 p-4 rounded mb-4 text-sm text-blue-800">
            Asegúrate de ingresar la fecha en formato YYYY-MM-DD y la hora en formato HH:MM (Ej: 2026-10-25 21:00).
        </div>

        {{ form.as_p }}

        <div class="flex space-x-4 mt-6">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                Confirmar Reserva
            </button>
            <a href="{% url 'core:reserva_list' %}"
                class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded">
                Volver
            </a>
        </div>
    </form>
</div>
{% endblock %}
