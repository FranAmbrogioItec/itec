<!-- templates/core/plato_confirm_delete.html -->
{% extends 'base.html' %}

{% block title %}Eliminar Plato | RestoManager{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-8 text-center mt-10">
    <h1 class="text-2xl font-bold text-red-600 mb-4">¿Estás seguro?</h1>
    <p class="text-gray-700 mb-6">Estás a punto de eliminar el plato "<strong>{{ object.nombre }}</strong>". Esta acción
        no se puede deshacer.</p>

    <form method="post">
        {% csrf_token %}
        <div class="flex justify-center space-x-4">
            <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">
                Sí, eliminar
            </button>
            <a href="{% url 'core:plato_list' %}"
                class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
