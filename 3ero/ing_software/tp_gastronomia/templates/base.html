<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema Gastronómico{% endblock %}</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex flex-col min-h-screen">

    <!-- Navbar -->
    <nav class="bg-gray-900 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="text-xl font-bold tracking-wider">🍽️ RestoITEC</a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/" class="hover:bg-gray-700 px-3 py-2 rounded-md text-sm font-medium">Inicio</a>

                    {% if user.is_authenticated %}
                    <a href="{% url 'core:plato_list' %}"
                        class="hover:bg-gray-700 px-3 py-2 rounded-md text-sm font-medium">Menú</a>
                    <a href="{% url 'core:reserva_list' %}"
                        class="hover:bg-gray-700 px-3 py-2 rounded-md text-sm font-medium">Mis Reservas</a>
                    <span class="text-gray-400 text-sm ml-4 border-l border-gray-600 pl-4">Hola, {{ user.username
                        }}</span>
                    <form method="post" action="{% url 'logout' %}" class="inline">
                        {% csrf_token %}
                        <button type="submit"
                            class="hover:bg-red-700 text-red-400 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition">
                            Salir
                        </button>
                    </form>
                    {% else %}
                    <a href="{% url 'login' %}"
                        class="bg-blue-600 hover:bg-blue-700 px-3 py-2 rounded-md text-sm font-medium">Iniciar
                        Sesión</a>
                    <a href="{% url 'registro' %}"
                        class="bg-green-600 hover:bg-green-700 px-3 py-2 rounded-md text-sm font-medium">Registrarse</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Contenido Principal -->
    <main class="flex-grow container mx-auto px-4 py-8">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-400 py-6 text-center">
        <p>&copy; 2026 RestoITEC. TP Evaluativo Django.</p>
    </footer>

</body>

</html>
