{% extends 'base.html' %}

{% block title %}Iniciar Sesión | RestoManager{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-8 mt-10">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Iniciar Sesión</h2>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
            Entrar
        </button>
    </form>
    <p class="mt-4 text-center text-gray-600">¿No tienes cuenta? <a href="{% url 'registro' %}"
            class="text-blue-600 hover:underline">Regístrate aquí</a></p>
</div>
{% endblock %}
